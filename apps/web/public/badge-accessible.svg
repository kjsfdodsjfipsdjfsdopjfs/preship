<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 32" fill="none">
  <!--
    PreShip Compliance Badge
    "Checked by PreShip" - horizontal badge for embedding
  -->

  <!-- Background -->
  <rect width="180" height="32" rx="6" fill="#0A0A0A"/>

  <!-- Orange left accent border -->
  <rect width="3" height="32" rx="1.5" fill="#F97316"/>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="179" height="31" rx="5.5" fill="none" stroke="#262626" stroke-width="1"/>

  <!-- Mini ship icon -->
  <g transform="translate(12, 4) scale(0.375)">
    <path d="M18 36 L28 28 L36 8 L36 40 Z" fill="#F97316"/>
    <path d="M36 16 L46 40 L36 40 Z" fill="#F97316" opacity="0.55"/>
    <path d="M12 44 L52 44 L46 54 L18 54 Z" fill="#F97316"/>
  </g>

  <!-- Checkmark circle -->
  <circle cx="148" cy="16" r="8" fill="none" stroke="#22C55E" stroke-width="1.5"/>
  <path d="M144 16 L147 19 L153 13" fill="none" stroke="#22C55E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text -->
  <text x="38" y="18" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#A3A3A3" letter-spacing="0.3">
    Checked by
  </text>
  <text x="38" y="27" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="-0.2">
    <tspan fill="#FFFFFF">Pre</tspan><tspan fill="#F97316">Ship</tspan>
  </text>
</svg>
