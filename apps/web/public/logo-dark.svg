<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!--
    PreShip Full Logo (Light background variant)
    Icon + "PreShip" wordmark
    "Pre" in dark, "Ship" in orange
  -->

  <!-- Icon scaled to fit 40x40 area with padding -->
  <g transform="translate(2, 2) scale(0.5625)">
    <!-- Sail with checkmark integration -->
    <path d="M18 36 L28 28 L36 8 L36 40 Z" fill="#F97316"/>
    <!-- Secondary sail -->
    <path d="M36 16 L46 40 L36 40 Z" fill="#F97316" opacity="0.55"/>
    <!-- Hull -->
    <path d="M12 44 L52 44 L46 54 L18 54 Z" fill="#F97316"/>
    <!-- Waterline -->
    <path d="M14 48 L50 48" stroke="#EA580C" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="46" y="27" font-family="'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" letter-spacing="-0.5">
    <tspan fill="#0A0A0A">Pre</tspan><tspan fill="#F97316">Ship</tspan>
  </text>
</svg>
