<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!--
    PreShip Logo Mark
    A geometric ship silhouette where the sail integrates a checkmark.
    The left sail edge + sail tip form the check stroke.
  -->

  <!-- Sail: a tall triangle whose left edge angles to suggest a checkmark -->
  <path d="M18 36 L28 28 L36 8 L36 40 Z" fill="#F97316"/>

  <!-- Secondary sail (right, lighter) -->
  <path d="M36 16 L46 40 L36 40 Z" fill="#F97316" opacity="0.55"/>

  <!-- Hull: a clean, slightly curved trapezoid -->
  <path d="M12 44 L52 44 L46 54 L18 54 Z" fill="#F97316"/>

  <!-- Waterline accent -->
  <path d="M14 48 L50 48" stroke="#EA580C" stroke-width="1.5" stroke-linecap="round"/>
</svg>
