<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: #0A0A0A;
    font-family: 'Inter', system-ui, sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
  }

  /* Strong orange glow */
  .glow-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1000px;
    height: 1000px;
    background: radial-gradient(ellipse, rgba(249,115,22,0.12) 0%, transparent 55%);
    pointer-events: none;
  }

  /* Grid lines */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(249,115,22,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,0.02) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 80px 72px;
    text-align: center;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 100px;
  }

  .logo-icon {
    width: 72px;
    height: 72px;
    background: #F97316;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 42px; height: 42px; }

  .logo-text {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .logo-text span { color: #F97316; }

  .tagline {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.04em;
    margin-bottom: 32px;
    max-width: 900px;
  }

  .tagline em {
    color: #F97316;
    font-style: normal;
  }

  .subtitle {
    font-size: 34px;
    color: #A3A3A3;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 80px;
    max-width: 800px;
  }

  /* Feature pills */
  .pills {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    margin-bottom: 80px;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #141414;
    border: 1px solid #262626;
    padding: 16px 28px;
    border-radius: 60px;
    font-size: 26px;
    font-weight: 600;
    color: #FFFFFF;
  }

  .pill-icon {
    width: 28px;
    height: 28px;
    color: #F97316;
  }

  /* Big CTA */
  .cta-block {
    margin-bottom: 32px;
  }

  .cta-btn {
    display: inline-block;
    background: #F97316;
    color: #FFFFFF;
    font-size: 42px;
    font-weight: 800;
    padding: 32px 80px;
    border-radius: 20px;
    letter-spacing: -0.01em;
    box-shadow: 0 0 80px rgba(249,115,22,0.3);
  }

  .cta-sub {
    font-size: 28px;
    color: #737373;
    margin-top: 20px;
  }

  /* Bottom stats bar */
  .stats-bar {
    position: absolute;
    bottom: 80px;
    left: 72px;
    right: 72px;
    display: flex;
    justify-content: space-between;
    padding: 32px 48px;
    background: #141414;
    border: 1px solid #262626;
    border-radius: 20px;
  }

  .stat-item {
    text-align: center;
  }

  .stat-val {
    font-size: 36px;
    font-weight: 800;
    color: #F97316;
  }

  .stat-label {
    font-size: 20px;
    color: #737373;
    font-weight: 500;
    margin-top: 4px;
  }

  .stat-divider {
    width: 1px;
    background: #262626;
  }
</style>
</head>
<body>
  <div class="glow-center"></div>
  <div class="grid-bg"></div>

  <div class="content">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12l2 2 4-4"/>
          <path d="M12 2L2 19h20L12 2z"/>
        </svg>
      </div>
      <div class="logo-text">Pre<span>Ship</span></div>
    </div>

    <div class="tagline">Your AI wrote<br>the code.<br><em>We check it.</em></div>

    <div class="subtitle">Accessibility, security & performance<br>scanning for vibe-coded apps.</div>

    <div class="pills">
      <div class="pill">
        <svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/>
        </svg>
        Results in 30s
      </div>
      <div class="pill">
        <svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12l2 2 4-4"/><rect x="3" y="3" width="18" height="18" rx="2"/>
        </svg>
        200+ checks
      </div>
      <div class="pill">
        <svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/>
        </svg>
        Copy-paste fixes
      </div>
      <div class="pill">
        <svg class="pill-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Free forever
      </div>
    </div>

    <div class="cta-block">
      <div class="cta-btn">preship.dev</div>
      <div class="cta-sub">Scan your app now. No signup needed.</div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-val">200+</div>
      <div class="stat-label">Checks per scan</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-val">&lt;30s</div>
      <div class="stat-label">To get results</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-val">6</div>
      <div class="stat-label">Audit categories</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <div class="stat-val">$0</div>
      <div class="stat-label">Free to scan</div>
    </div>
  </div>
</body>
</html>
