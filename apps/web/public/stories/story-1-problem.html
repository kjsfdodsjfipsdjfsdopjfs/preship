<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: #0A0A0A;
    font-family: 'Inter', system-ui, sans-serif;
    color: #FFFFFF;
    overflow: hidden;
    position: relative;
  }

  /* Orange glow top */
  .glow-top {
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(249,115,22,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Subtle grid pattern */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(249,115,22,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(249,115,22,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 80px 72px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 120px;
  }

  .logo-icon {
    width: 56px;
    height: 56px;
    background: #F97316;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg {
    width: 32px;
    height: 32px;
  }

  .logo-text {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .logo-text span {
    color: #F97316;
  }

  .main-stat {
    margin-bottom: 48px;
  }

  .stat-number {
    font-size: 200px;
    font-weight: 900;
    color: #F97316;
    line-height: 0.9;
    letter-spacing: -0.04em;
  }

  .stat-unit {
    font-size: 120px;
    font-weight: 900;
    color: #F97316;
    line-height: 0.9;
    letter-spacing: -0.04em;
  }

  .stat-label {
    font-size: 48px;
    font-weight: 600;
    color: #A3A3A3;
    margin-top: 24px;
    line-height: 1.3;
  }

  .stat-label em {
    color: #FFFFFF;
    font-style: normal;
  }

  .divider {
    width: 120px;
    height: 4px;
    background: #F97316;
    margin: 64px 0;
    border-radius: 2px;
  }

  .secondary-stats {
    display: flex;
    flex-direction: column;
    gap: 40px;
    flex: 1;
  }

  .sec-stat {
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  .sec-stat-num {
    font-size: 64px;
    font-weight: 800;
    color: #EF4444;
    letter-spacing: -0.02em;
    min-width: 220px;
  }

  .sec-stat-label {
    font-size: 32px;
    color: #737373;
    font-weight: 500;
    line-height: 1.4;
  }

  .bottom-cta {
    margin-top: auto;
    padding-top: 60px;
  }

  .cta-text {
    font-size: 36px;
    font-weight: 600;
    color: #FFFFFF;
    margin-bottom: 16px;
  }

  .cta-url {
    font-size: 40px;
    font-weight: 700;
    color: #F97316;
    letter-spacing: -0.01em;
  }

  /* Decorative red warning pulse */
  .warning-glow {
    position: absolute;
    bottom: 400px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(239,68,68,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="glow-top"></div>
  <div class="grid-bg"></div>
  <div class="warning-glow"></div>

  <div class="content">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12l2 2 4-4"/>
          <path d="M12 2L2 19h20L12 2z"/>
        </svg>
      </div>
      <div class="logo-text">Pre<span>Ship</span></div>
    </div>

    <div class="main-stat">
      <div class="stat-number">95<span class="stat-unit">%</span></div>
      <div class="stat-label">of <em>vibe-coded apps</em> fail<br>accessibility standards</div>
    </div>

    <div class="divider"></div>

    <div class="secondary-stats">
      <div class="sec-stat">
        <div class="sec-stat-num">$75K</div>
        <div class="sec-stat-label">average ADA lawsuit<br>settlement</div>
      </div>
      <div class="sec-stat">
        <div class="sec-stat-num">5,114</div>
        <div class="sec-stat-label">lawsuits filed<br>in 2025 alone</div>
      </div>
      <div class="sec-stat">
        <div class="sec-stat-num">+37%</div>
        <div class="sec-stat-label">YoY increase in<br>ADA enforcement</div>
      </div>
    </div>

    <div class="bottom-cta">
      <div class="cta-text">Scan your app free</div>
      <div class="cta-url">preship.dev</div>
    </div>
  </div>
</body>
</html>
